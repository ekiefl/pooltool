name: lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        run: uv python install  # Determines version from .python-version

      - name: Install linting dependencies
        run: uv sync --only-group dev --no-install-project

      - name: Run lint
        run: uv run --no-sync make lint-check

      - name: Check formatting
        run: uv run --no-sync make format-check
